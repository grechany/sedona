    <main class="main-index">
        <div class="main-container">
           <div class="filter-wrapper">
                <section class="breadcrumbs">
                    <h1 class="page-title">Гостиницы Седоны</h1>
                    <ul class="breadcrumbs-list">
                        <li class="breadcrumbs-item">
                            <a class="breadcrumbs-link" href="/sedona/index.html">Главная</a>

                            <a class="breadcrumbs-link">Гостиницы</a>
                        </li>
                    </ul>
                </section>
                <section class="filter-section">
                    <form class="filter-form" action="https://echo.htmlacademy.ru" method="post">
                        <div class="fliter-item">
                            <p class="filter-description">Инфраструктура:</p>
                            <input class="input-checkbox" id="pool" name="pool" type="checkbox" checked>
                            <label class="input-name" for="pool">Бассейн</label><br>
                            <input class="input-checkbox" id="parking" name="parking" type="checkbox" checked>
                            <label class="input-name" for="parking">Парковка</label><br>
                            <input class="input-checkbox" id="wi-fi" name="wi-fi" type="checkbox">
                            <label class="input-name" for="wi-fi">Wi-Fi</label><br>
                        </div>
                        <div class="fliter-item">
                            <p class="filter-description">Тип жилья:</p>
                            <input class="input-checkbox" id="hotel" name="hotel" type="radio" checked>
                            <label class="input-name" for="hotel">Гостиница</label><br>
                            <input class="input-checkbox" id="motel" name="motel" type="radio">
                            <label class="input-name" for="motel">Мотель</label><br>
                            <input class="input-checkbox" id="aparts" name="aparts" type="radio">
                            <label class="input-name" for="aparts">Апартаменты</label><br>
                        </div>
                    
                    </form>
